<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجمع طبي</title>

<style>
body{margin:0;font-family:Tahoma;background:#0b132b;color:#fff}
section{padding:60px 20px;text-align:center}
h1,h2{margin-bottom:15px}
.btn{padding:12px 20px;background:#22c55e;color:#fff;border:none;border-radius:10px;cursor:pointer}
input{padding:10px;border-radius:8px;border:none;width:200px;margin:5px}

/* hero */
.hero{background:linear-gradient(135deg,#1e3a8a,#0ea5e9)}
.cards{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.card{background:#1e293b;padding:20px;border-radius:15px;width:200px}

/* hidden */
.hidden{display:none}

/* dashboard */
.dashboard{display:flex}
.sidebar{width:200px;background:#020617;height:100vh;padding:20px}
.content{flex:1;padding:20px}
.item{background:#1e293b;margin:10px;padding:10px;border-radius:10px}

/* login */
.login{max-width:300px;margin:100px auto;background:#1e293b;padding:20px;border-radius:20px}
</style>
</head>

<body>

<!-- 🌍 الموقع -->
<div id="site">

<section class="hero">
  <h1>مجمع ملاك الرحمة الطبي</h1>
  <p>أفضل رعاية طبية في مكان واحد</p>
  <button class="btn" onclick="goLogin()">دخول الإدارة</button>
</section>

<section>
  <h2>الخدمات</h2>
  <div class="cards">
    <div class="card">طب عام</div>
    <div class="card">أسنان</div>
    <div class="card">أطفال</div>
    <div class="card">تحاليل</div>
  </div>
</section>

<section>
  <h2>الأطباء</h2>
  <div id="doctorsView"></div>
</section>

<section>
  <h2>حجز موعد</h2>
  <input id="pname" placeholder="اسمك">
  <input id="pdoc" placeholder="الدكتور">
  <button class="btn" onclick="book()">حجز</button>
</section>

</div>

<!-- 🔐 login -->
<div id="login" class="hidden">
  <div class="login">
    <h2>تسجيل الدخول</h2>
    <input id="user"><br>
    <input id="pass" type="password"><br>
    <button class="btn" onclick="login()">دخول</button>
    <p>admin / 1234</p>
  </div>
</div>

<!-- 📊 dashboard -->
<div id="dash" class="hidden dashboard">

<div class="sidebar">
  <h3>Dashboard</h3>
  <button onclick="show('home')">الرئيسية</button>
  <button onclick="show('doc')">الأطباء</button>
  <button onclick="show('app')">الحجوزات</button>
  <button onclick="logout()">خروج</button>
</div>

<div class="content">

<div id="home">
<h2>احصائيات</h2>
<p>أطباء: <span id="dc"></span></p>
<p>حجوزات: <span id="ac"></span></p>
</div>

<div id="doc" class="hidden">
<h2>الأطباء</h2>
<input id="dname" placeholder="اسم">
<button onclick="addDoc()">إضافة</button>
<div id="docList"></div>
</div>

<div id="app" class="hidden">
<h2>الحجوزات</h2>
<div id="appList"></div>
</div>

</div>
</div>

<script>

let doctors=JSON.parse(localStorage.getItem("docs"))||["د. أحمد","د. سارة"]
let apps=JSON.parse(localStorage.getItem("apps"))||[]

function save(){
localStorage.setItem("docs",JSON.stringify(doctors))
localStorage.setItem("apps",JSON.stringify(apps))
load()
}

function load(){
document.getElementById("dc").innerText=doctors.length
document.getElementById("ac").innerText=apps.length

// doctors
let dhtml=""
doctors.forEach((d,i)=>{
dhtml+=`<div class="item">${d} <button onclick="delDoc(${i})">حذف</button></div>`
})
document.getElementById("docList").innerHTML=dhtml

// apps
let ahtml=""
apps.forEach((a,i)=>{
ahtml+=`<div class="item">${a.name} مع ${a.doc}</div>`
})
document.getElementById("appList").innerHTML=ahtml

// view
let view=""
doctors.forEach(d=>view+=`<div class="card">${d}</div>`)
document.getElementById("doctorsView").innerHTML=view
}

// login
function goLogin(){
document.getElementById("site").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")
}

function login(){
let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="1234"){
document.getElementById("login").classList.add("hidden")
document.getElementById("dash").classList.remove("hidden")
load()
}else{
alert("خطأ")
}
}

function logout(){
location.reload()
}

// nav
function show(p){
document.getElementById("home").classList.add("hidden")
document.getElementById("doc").classList.add("hidden")
document.getElementById("app").classList.add("hidden")
document.getElementById(p).classList.remove("hidden")
}

// doctors
function addDoc(){
let n=document.getElementById("dname").value
doctors.push(n)
save()
}

function delDoc(i){
doctors.splice(i,1)
save()
}

// booking
function book(){
let n=document.getElementById("pname").value
let d=document.getElementById("pdoc").value
apps.push({name:n,doc:d})
save()
alert("تم الحجز")
}

load()

</script>

</body>
</html>
