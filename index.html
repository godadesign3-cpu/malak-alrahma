<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Ultra System V4</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.screen{display:none;padding:20px}
.active{display:block}

/* Login */
.login-box{max-width:400px;margin:100px auto;background:#1e293b;padding:30px;border-radius:20px}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none}
button{padding:12px 20px;border:none;border-radius:10px;background:#22c55e;color:#fff;cursor:pointer}

/* Dashboard */
.sidebar{position:fixed;right:0;top:0;width:220px;height:100%;background:#020617;padding:20px}
.sidebar button{width:100%;margin:10px 0;background:#334155}
.content{margin-right:240px;padding:20px}

/* Cards */
.card{background:#1e293b;padding:20px;border-radius:15px;margin:10px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">دخول</button>
    <p>admin / 1234 | user / 1234</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="sidebar">
    <h3>لوحة التحكم</h3>
    <button onclick="show('home')">الرئيسية</button>
    <button onclick="show('doctors')">الأطباء</button>
    <button onclick="show('appointments')">الحجوزات</button>
    <button onclick="logout()">خروج</button>
  </div>

  <div class="content">
    
    <div id="home" class="page">
      <h2>📊 الاحصائيات</h2>
      <div class="card">عدد الأطباء: <span id="docCount"></span></div>
      <div class="card">عدد الحجوزات: <span id="appCount"></span></div>
    </div>

    <div id="doctors" class="page" style="display:none">
      <h2>👨‍⚕️ إدارة الأطباء</h2>
      <input id="docName" placeholder="اسم الدكتور">
      <button onclick="addDoctor()">إضافة</button>
      <div id="docList"></div>
    </div>

    <div id="appointments" class="page" style="display:none">
      <h2>📅 الحجوزات</h2>
      <input id="appName" placeholder="اسم المريض">
      <button onclick="addApp()">إضافة</button>
      <div id="appList"></div>
    </div>

  </div>
</div>

<script>
const users = {
  admin: { pass: "1234", role: "admin" },
  user: { pass: "1234", role: "user" }
};

let currentUser = null;

function login() {
  let u = document.getElementById("user").value.trim().toLowerCase();
  let p = document.getElementById("pass").value.trim();

  if (!u || !p) {
    alert("من فضلك اكتب اسم المستخدم وكلمة المرور");
    return;
  }

  if (users[u] && users[u].pass === p) {
    currentUser = users[u];
    document.getElementById("login").classList.remove("active");
    document.getElementById("dashboard").classList.add("active");
    loadData();
  } else {
    alert("خطأ في البيانات");
  }
}

function logout() {
  currentUser = null;
  document.getElementById("dashboard").classList.remove("active");
  document.getElementById("login").classList.add("active");
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
}

function show(page) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(page).style.display = "block";
}

let doctors = JSON.parse(localStorage.getItem("doctors")) || [];
let apps = JSON.parse(localStorage.getItem("apps")) || [];

function save() {
  localStorage.setItem("doctors", JSON.stringify(doctors));
  localStorage.setItem("apps", JSON.stringify(apps));
  loadData();
}

function addDoctor() {
  let name = document.getElementById("docName").value.trim();
  if (!name) return;
  doctors.push(name);
  document.getElementById("docName").value = "";
  save();
}

function deleteDoctor(i) {
  doctors.splice(i, 1);
  save();
}

function addApp() {
  let name = document.getElementById("appName").value.trim();
  if (!name) return;
  apps.push(name);
  document.getElementById("appName").value = "";
  save();
}

function deleteApp(i) {
  apps.splice(i, 1);
  save();
}

function loadData() {
  document.getElementById("docCount").innerText = doctors.length;
  document.getElementById("appCount").innerText = apps.length;

  let docHTML = "";
  doctors.forEach((d, i) => {
    docHTML += `<div class="card">${d} <button onclick="deleteDoctor(${i})">حذف</button></div>`;
  });
  document.getElementById("docList").innerHTML = docHTML;

  let appHTML = "";
  apps.forEach((a, i) => {
    appHTML += `<div class="card">${a} <button onclick="deleteApp(${i})">حذف</button></div>`;
  });
  document.getElementById("appList").innerHTML = appHTML;
}

document.getElementById("pass").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
